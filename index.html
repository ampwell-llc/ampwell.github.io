<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    :root {
      --title-size: clamp(48px, 8vw, 80px);
      --tagline-ratio: 0.295;
      --dark-green: #0A2A24;
      --mid-green: #227E6C;
      --bg: #f5f5f5;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: "Montserrat", sans-serif;
      position: relative;
      overflow: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .background img {
      position: absolute;
      width: 140vw;
      height: 140vh;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.5;
      animation: drift 28s ease-in-out infinite;
      object-fit: cover;
    }

    @keyframes drift {
      0% {
        transform: translate(-50%, -50%) translate(0px, 0px);
      }
      25% {
        transform: translate(-50%, -50%) translate(-6px, 4px);
      }
      50% {
        transform: translate(-50%, -50%) translate(6px, -3px);
      }
      75% {
        transform: translate(-50%, -50%) translate(3px, 5px);
      }
      100% {
        transform: translate(-50%, -50%) translate(0px, 0px);
      }
    }

    .container {
      width: 90%;
      max-width: 600px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .box {
      border: 3px solid var(--dark-green);
      padding: 50px 40px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(2px);
    }

    .brand {
      display: inline-block;
    }

    .title {
      font-weight: 700;
      font-size: var(--title-size);
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .title-amp {
      color: var(--dark-green);
    }

    .title-well {
      color: var(--mid-green);
    }

    .tagline {
      font-weight: 600;
      font-size: calc(var(--title-size) * var(--tagline-ratio));
      letter-spacing: 0.08em;
      color: var(--dark-green);
      line-height: 1;
      margin-bottom: 30px;
      white-space: nowrap;
    }

    p, a {
      color: var(--dark-green);
      font-size: clamp(14px, 2.5vw, 20px);
      text-decoration: none;
    }

    p {
      margin: 0;
    }

    .contact {
      margin-top: 15px;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    @media (max-width: 500px) {
      .box {
        padding: 36px 20px;
      }

      .background img {
        width: 180vw;
        height: 180vh;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .background img {
        animation: none;
      }
    }
  </style>
</head>

<body>
  <div class="background" aria-hidden="true">
    <img src="assets/wave-pattern.svg" alt="">
  </div>

  <div class="container">
    <div class="box">
      <div class="brand">
        <div class="title">
          <span class="title-amp">AMP</span><span class="title-well">WELL</span>
        </div>

        <div class="tagline">
          BATTERY HEALTH INTELLIGENCE
        </div>
      </div>

      <p>Full Site Coming Soon</p>

      <div class="contact">
        <a href="mailto:info@ampwelldiagnostics.com">
          info@ampwelldiagnostics.com
        </a>
      </div>
    </div>
  </div>
</body>
</html>
